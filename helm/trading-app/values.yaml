# ─── Global ───────────────────────────────────────────────────────────────────
global:
  imageRegistry: ghcr.io
  imagePullSecrets: [ghcr-secret]
  storageClass: gp2

# ─── API ──────────────────────────────────────────────────────────────────────
api:
  replicaCount: 2
  image:
    repository: YOUR_ORG/trading-app-api
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  env:
    ASPNETCORE_ENVIRONMENT: Production
  secrets:
    jwtSecret: ""       # Set in values-prod.yaml or via sealed secrets
    dbConnection: ""

# ─── Frontend ─────────────────────────────────────────────────────────────────
frontend:
  replicaCount: 2
  image:
    repository: YOUR_ORG/trading-app-frontend
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80

# ─── MySQL ────────────────────────────────────────────────────────────────────
mysql:
  enabled: true
  auth:
    rootPassword: ""  # Override in values-prod.yaml
    database: tradingapp
    username: tradinguser
    password: ""
  primary:
    persistence:
      enabled: true
      size: 20Gi
      storageClass: gp2
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"

# ─── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: trading.yourdomain.com
      paths: [/]
  tls:
    - secretName: trading-tls
      hosts: [trading.yourdomain.com]

# ─── Monitoring ───────────────────────────────────────────────────────────────
serviceMonitor:
  enabled: true
  namespace: monitoring
  interval: 30s

# ─── Pod Security ─────────────────────────────────────────────────────────────
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
