global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: trading-app
    environment: production

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alert-rules.yml"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: trading-api
    metrics_path: /metrics
    static_configs:
      - targets: [api:8080]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: mysql
    static_configs:
      - targets: [mysql:9104]
    metrics_path: /metrics

  - job_name: node-exporter
    static_configs:
      - targets: [node-exporter:9100]

  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]
    metrics_path: /metrics
