sonar.projectKey=trading-app
sonar.projectName=TradingApp
sonar.projectVersion=1.0

sonar.sources=src/
sonar.exclusions=**/bin/**,**/obj/**,**/node_modules/**,**/*.spec.*
sonar.tests=tests/
sonar.test.inclusions=**/*.Tests/**

# .NET coverage
sonar.cs.opencover.reportsPaths=coverage/**/coverage.opencover.xml
sonar.cs.vstest.reportsPaths=coverage/**/*.trx

# TypeScript
sonar.javascript.lcov.reportPaths=src/TradingApp.Frontend/coverage/lcov.info

# Quality Gate
sonar.qualitygate.wait=true

# Security - SAST rules
sonar.security.sources.owasp.enabled=true
