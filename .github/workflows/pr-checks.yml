name: "🔍 PR Quality Gates"

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: [self-hosted, trading]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & Build
        run: |
          dotnet restore TradingApp.sln
          dotnet build TradingApp.sln -c Release --no-restore

      - name: Run Tests
        run: |
          dotnet test TradingApp.sln -c Release --no-build \
            --collect:"XPlat Code Coverage" \
            --logger "trx;LogFileName=results.trx"

      - name: Frontend Lint
        run: |
          cd src/TradingApp.Frontend
          npm ci --legacy-peer-deps
          npm run lint

      - name: Trivy Quick Scan (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: '1'
